<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Background -->
  <rect width="48" height="48" rx="10" fill="#1e293b"/>
  <!-- Antennae -->
  <line x1="16" y1="13" x2="11" y2="5" stroke="#3DDC84" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="13" x2="37" y2="5" stroke="#3DDC84" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Head dome: arc from (10,23) up through apex to (38,23) -->
  <path d="M10 23 A14 14 0 0 1 38 23 Z" fill="#3DDC84"/>
  <!-- Eyes -->
  <circle cx="19" cy="19" r="2.5" fill="#1e293b"/>
  <circle cx="29" cy="19" r="2.5" fill="#1e293b"/>
  <!-- Body -->
  <rect x="10" y="23" width="28" height="16" rx="3" fill="#3DDC84"/>
  <!-- Arms -->
  <rect x="4"  y="23" width="5" height="12" rx="2.5" fill="#3DDC84"/>
  <rect x="39" y="23" width="5" height="12" rx="2.5" fill="#3DDC84"/>
  <!-- Legs -->
  <rect x="13" y="38" width="8" height="8" rx="2.5" fill="#3DDC84"/>
  <rect x="27" y="38" width="8" height="8" rx="2.5" fill="#3DDC84"/>
</svg>
